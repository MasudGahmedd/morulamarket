<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morula Market | Coming Soon</title>
  <meta name="description" content="Morula Market is coming soon. Be the first to join the waitlist as an agent, seller, or buyer in Botswana.">
  <meta name="theme-color" content="#2775FD">
  <link rel="preconnect" href="https://fonts.cdnfonts.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/sf-pro-display" rel="stylesheet">
  <script>
    window.va = window.va || function () {
      (window.vaq = window.vaq || []).push(arguments);
    };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    :root {
      --font-sf: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --radius: 24px;
      --bg: #ffffff;
      --bg-secondary: rgba(255, 255, 255, 0.78);
      --card: rgba(255, 255, 255, 0.84);
      --text: #050505;
      --muted: #4b5563;
      --border: rgba(39, 117, 253, 0.14);
      --primary: #2775fd;
      --primary-contrast: #ffffff;
      --shadow: 0 24px 80px rgba(39, 117, 253, 0.12);
      --liquid-a: rgba(39, 117, 253, 0.24);
      --liquid-b: rgba(255, 255, 255, 0.74);
      --liquid-c: rgba(5, 5, 5, 0.09);
    }

    body[data-theme="dark"] {
      --bg: #050505;
      --bg-secondary: rgba(10, 10, 10, 0.72);
      --card: rgba(18, 18, 18, 0.74);
      --text: #ffffff;
      --muted: #b6c2d6;
      --border: rgba(39, 117, 253, 0.22);
      --primary: #2775fd;
      --primary-contrast: #ffffff;
      --shadow: 0 26px 90px rgba(0, 0, 0, 0.36);
      --liquid-a: rgba(39, 117, 253, 0.34);
      --liquid-b: rgba(255, 255, 255, 0.08);
      --liquid-c: rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-sf);
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      transition: background-color 180ms ease, color 180ms ease;
    }

    .liquid-bg {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: -1;
    }

    .blob {
      position: absolute;
      border-radius: 999px;
      filter: blur(70px);
      opacity: 0.95;
      animation: drift 16s ease-in-out infinite;
    }

    .blob-a {
      width: 360px;
      height: 360px;
      top: -60px;
      left: -80px;
      background: var(--liquid-a);
    }

    .blob-b {
      width: 420px;
      height: 420px;
      right: -120px;
      top: 12%;
      background: var(--liquid-b);
      animation-duration: 20s;
    }

    .blob-c {
      width: 320px;
      height: 320px;
      left: 28%;
      bottom: -100px;
      background: var(--liquid-c);
      animation-duration: 18s;
    }

    .page {
      width: min(100%, 940px);
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .topbar {
      position: relative;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      min-height: 52px;
      margin-bottom: 32px;
    }

    .brand {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
      font-size: calc(1rem + 5px);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: end;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .theme-toggle-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .theme-toggle-label {
      display: inline;
    }

    .spacer {
      display: none;
    }

    .hero {
      min-height: calc(100vh - 120px);
      display: grid;
      place-items: center;
    }

    .hero-card {
      width: 100%;
      padding: 28px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.4rem, 7vw, 4.8rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .hero-copy {
      width: min(100%, 680px);
      margin: 0 auto;
      font-size: clamp(1rem, 2.3vw, 1.18rem);
      line-height: 1.65;
      color: var(--muted);
    }

    .type-line {
      display: inline-flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
      min-height: 2.2em;
      font-size: clamp(1.1rem, 2.8vw, 1.4rem);
      font-weight: 600;
      color: var(--text);
    }

    .typed-word {
      color: var(--primary);
    }

    .cursor {
      display: inline-block;
      width: 1ch;
      color: var(--text);
      animation: blink 1s steps(1, end) infinite;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 26px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      border: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.96rem;
      text-decoration: none;
      transition: transform 160ms ease, background-color 160ms ease, color 160ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .button-primary {
      background: var(--primary);
      color: var(--primary-contrast);
    }

    .button-secondary {
      background: var(--bg-secondary);
      color: var(--text);
      backdrop-filter: blur(14px);
    }

    .button-whatsapp {
      background: #25d366;
      color: #ffffff;
      border-color: rgba(37, 211, 102, 0.4);
    }

    .button-whatsapp:hover {
      background: #20bd5c;
    }

    .button-icon {
      width: 18px;
      height: 18px;
      margin-right: 8px;
      flex-shrink: 0;
    }

    .waitlist-box {
      width: min(100%, 560px);
      margin: 28px auto 0;
      display: flex;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--bg-secondary);
      backdrop-filter: blur(14px);
    }

    .waitlist-input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      padding: 0 8px;
    }

    .waitlist-input::placeholder {
      color: var(--muted);
    }

    .waitlist-note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @keyframes blink {
      0%, 49% {
        opacity: 1;
      }
      50%, 100% {
        opacity: 0;
      }
    }

    @keyframes drift {
      0%, 100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      50% {
        transform: translate3d(18px, -24px, 0) scale(1.08);
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 16px 12px 28px;
      }

      .topbar {
        margin-bottom: 20px;
      }

      .brand {
        font-size: 1.25rem;
      }

      .hero {
        min-height: calc(100vh - 92px);
      }

      .hero-card {
        padding: 22px 16px;
        border-radius: 22px;
      }

      .waitlist-box {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }

      .actions {
        flex-direction: column;
      }

      .theme-toggle {
        width: auto;
        min-width: 42px;
        min-height: 42px;
        padding: 0;
      }

      .theme-toggle-label {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>
<body data-theme="light">
  <div class="liquid-bg" aria-hidden="true">
    <div class="blob blob-a"></div>
    <div class="blob blob-b"></div>
    <div class="blob blob-c"></div>
  </div>

  <div class="page">
    <header class="topbar">
      <div class="spacer" aria-hidden="true"></div>
      <div class="brand">Morula Markets</div>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Toggle color theme">
        <svg class="theme-toggle-icon" id="theme-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2.5"></path>
          <path d="M12 19.5V22"></path>
          <path d="M4.93 4.93l1.77 1.77"></path>
          <path d="M17.3 17.3l1.77 1.77"></path>
          <path d="M2 12h2.5"></path>
          <path d="M19.5 12H22"></path>
          <path d="M4.93 19.07l1.77-1.77"></path>
          <path d="M17.3 6.7l1.77-1.77"></path>
        </svg>
        <span class="theme-toggle-label">Light mode</span>
      </button>
    </header>

    <main class="hero">
      <section class="hero-card" aria-labelledby="hero-title">
        <p class="eyebrow">Botswana marketplace</p>
        <h1 id="hero-title">Coming soon.</h1>
        <p class="hero-copy">
          Morula Markets is launching soon for Botswana. Be the first to sign up and get early access before the marketplace opens publicly.
        </p>
        <div class="type-line" aria-live="polite">
          <span id="type-prefix">Be the first to sign up as</span>
          <span class="typed-word" id="typed-word"></span>
          <span class="cursor">|</span>
        </div>

        <form class="waitlist-box" id="waitlist-form" novalidate>
          <input class="waitlist-input" id="waitlist-email" type="email" name="email" placeholder="Enter your email for the waitlist" aria-label="Email for the waitlist" required>
          <button class="button button-primary" id="waitlist-submit" type="button">Join the waitlist</button>
        </form>

        <div class="actions">
          <a class="button button-whatsapp" href="https://wa.me/26775516905?text=Hi%20Masud%2C%20I%20want%20to%20chat%20about%20Morula%20Markets." target="_blank" rel="noreferrer">
            <svg class="button-icon" viewBox="0 0 32 32" aria-hidden="true" fill="currentColor">
              <path d="M19.11 17.21c-.28-.14-1.64-.81-1.89-.9-.25-.09-.43-.14-.61.14-.18.28-.7.9-.86 1.09-.16.19-.32.21-.6.07-.28-.14-1.16-.43-2.21-1.37-.82-.73-1.37-1.62-1.53-1.9-.16-.28-.02-.43.12-.57.12-.12.28-.32.42-.48.14-.16.19-.28.28-.46.09-.19.05-.35-.02-.49-.07-.14-.61-1.47-.84-2.01-.22-.53-.45-.46-.61-.47h-.52c-.19 0-.49.07-.74.35-.25.28-.95.93-.95 2.26 0 1.32.97 2.6 1.11 2.79.14.19 1.9 2.9 4.61 4.07.64.28 1.15.44 1.54.56.65.21 1.25.18 1.72.11.53-.08 1.64-.67 1.87-1.32.23-.65.23-1.21.16-1.32-.07-.11-.25-.18-.53-.32z"/>
              <path d="M16.03 3.2c-6.97 0-12.63 5.65-12.63 12.61 0 2.22.58 4.39 1.68 6.3L3.2 28.8l6.86-1.8a12.65 12.65 0 0 0 5.97 1.52h.01c6.96 0 12.62-5.66 12.62-12.62 0-3.37-1.31-6.54-3.7-8.92A12.55 12.55 0 0 0 16.03 3.2zm0 23.19h-.01a10.5 10.5 0 0 1-5.35-1.47l-.38-.22-4.07 1.07 1.09-3.96-.25-.41a10.45 10.45 0 0 1-1.61-5.59c0-5.79 4.72-10.5 10.52-10.5 2.81 0 5.45 1.09 7.43 3.08a10.43 10.43 0 0 1 3.08 7.42c0 5.8-4.72 10.52-10.45 10.52z"/>
            </svg>
            Chat on WhatsApp
          </a>
        </div>

        <p class="waitlist-note" id="waitlist-note">Early signups open first for agents, sellers, and buyers.</p>
      </section>
    </main>
  </div>

  <script>
    const SUPABASE_URL = "https://zioeumxpjaecgocsouyj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_N39Prr3PH27w-bhEuu_eXw_UubsrycZ";

    const themeToggle = document.getElementById("theme-toggle");
    const typedWord = document.getElementById("typed-word");
    const waitlistForm = document.getElementById("waitlist-form");
    const waitlistEmail = document.getElementById("waitlist-email");
    const waitlistSubmit = document.getElementById("waitlist-submit");
    const waitlistNote = document.getElementById("waitlist-note");
    const body = document.body;
    const words = ["an agent", "a seller", "a buyer"];
    let wordIndex = 0;
    let charIndex = 0;
    let deleting = false;

    function setThemeIcon(theme) {
      const icon = document.getElementById("theme-toggle-icon");

      if (!icon) {
        return;
      }

      if (theme === "dark") {
        icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3c0 .14-.01.29-.01.43a7 7 0 0 0 9.37 6.58c.15 0 .29-.01.43-.02z"></path>';
      } else {
        icon.innerHTML = '<circle cx="12" cy="12" r="4"></circle><path d="M12 2v2.5"></path><path d="M12 19.5V22"></path><path d="M4.93 4.93l1.77 1.77"></path><path d="M17.3 17.3l1.77 1.77"></path><path d="M2 12h2.5"></path><path d="M19.5 12H22"></path><path d="M4.93 19.07l1.77-1.77"></path><path d="M17.3 6.7l1.77-1.77"></path>';
      }
    }

    function applyTheme(theme) {
      body.setAttribute("data-theme", theme);

      const label = themeToggle ? themeToggle.querySelector(".theme-toggle-label") : null;
      if (label) {
        label.textContent = theme === "dark" ? "Light mode" : "Dark mode";
      }

      setThemeIcon(theme);

      try {
        localStorage.setItem("morula-theme", theme);
      } catch (error) {
      }
    }

    function initThemeToggle() {
      let savedTheme = null;

      try {
        savedTheme = localStorage.getItem("morula-theme");
      } catch (error) {
      }

      applyTheme(savedTheme === "dark" ? "dark" : "light");

      if (themeToggle) {
        themeToggle.addEventListener("click", () => {
          const nextTheme = body.getAttribute("data-theme") === "dark" ? "light" : "dark";
          applyTheme(nextTheme);
        });
      }
    }

    async function submitWaitlist() {
      const email = waitlistEmail.value.trim().toLowerCase();

      if (!email || !waitlistEmail.checkValidity()) {
        waitlistNote.textContent = "Enter a valid email address first.";
        return;
      }

      if (
        !SUPABASE_URL ||
        !SUPABASE_ANON_KEY ||
        SUPABASE_URL === "YOUR_SUPABASE_URL" ||
        SUPABASE_ANON_KEY === "YOUR_SUPABASE_ANON_KEY"
      ) {
        waitlistNote.textContent = "Add your Supabase URL and anon key in this file to start collecting emails.";
        return;
      }

      waitlistNote.textContent = "Joining waitlist...";
      waitlistSubmit.disabled = true;

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/waitlist_signups`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            "Prefer": "return=minimal"
          },
          body: JSON.stringify({
            email,
            source: "coming-soon",
            role_interest: "unknown"
          })
        });

        if (response.ok) {
          waitlistForm.reset();
          waitlistNote.textContent = "You are on the waitlist. We will let you know when Morula Market opens.";
          return;
        }

        let errorMessage = "Could not save your email right now. Please try again.";

        try {
          const errorData = await response.json();

          if (response.status === 409 || errorData.code === "23505") {
            errorMessage = "That email is already on the waitlist.";
          } else if (errorData.message) {
            errorMessage = `Could not save your email: ${errorData.message}`;
          }
        } catch (error) {
        }

        waitlistNote.textContent = errorMessage;
      } catch (error) {
        waitlistNote.textContent = "Could not connect to Supabase. Check your project URL, key, and network access.";
      } finally {
        waitlistSubmit.disabled = false;
      }
    }

    function initWaitlist() {
      if (waitlistForm) {
        waitlistForm.addEventListener("submit", (event) => {
          event.preventDefault();
          submitWaitlist();
        });
      }

      if (waitlistSubmit) {
        waitlistSubmit.addEventListener("click", submitWaitlist);
      }

      if (waitlistEmail) {
        waitlistEmail.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            submitWaitlist();
          }
        });
      }
    }

    function typeLoop() {
      const currentWord = words[wordIndex];
      let delay = deleting ? 55 : 95;

      if (!deleting) {
        charIndex += 1;
        typedWord.textContent = currentWord.slice(0, charIndex);

        if (charIndex === currentWord.length) {
          deleting = true;
          delay = 1200;
        }
      } else {
        charIndex -= 1;
        typedWord.textContent = currentWord.slice(0, charIndex);

        if (charIndex === 0) {
          deleting = false;
          wordIndex = (wordIndex + 1) % words.length;
          delay = 220;
        }
      }

      window.setTimeout(typeLoop, delay);
    }

    function initTyping() {
      if (!typedWord) {
        return;
      }

      typedWord.textContent = "";
      charIndex = 0;
      deleting = false;
      typeLoop();
    }

    initThemeToggle();
    initWaitlist();
    initTyping();
  </script>
</body>
</html>
